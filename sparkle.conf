# Sparkle configuration for Caker
APP_NAME="Caker"
BUNDLE_ID="com.aldunelabs.caker" 
GITHUB_REPO="Fred78290/caker"

# Default URLs
GITHUB_RELEASES_URL="https://github.com/${GITHUB_REPO}/releases"
GITHUB_TAGS_URL="https://api.github.com/repos/${GITHUB_REPO}/tags"
APPCAST_URL="https://github.com/${GITHUB_REPO}/releases.atom"

# Signature configuration
SPARKLE_SIGNATURE_ALGORITHM="ed25519"
SPARKLE_KEYS_DIR=".sparkle"

# Update parameters
UPDATE_CHECK_INTERVAL="86400"  # 24 hours
ENABLE_AUTOMATIC_CHECKS="true"
ALLOW_AUTOMATIC_UPDATES="true"

# Build configuration
BUILD_CONFIGURATION="Release"
ARCHIVE_EXPORT_METHOD="developer-id"
DMG_VOLUME_NAME="${APP_NAME} Installer"

# Work folders
BUILD_DIR="build"
RELEASES_DIR="releases" 
APPCAST_DIR="appcast"
TEMP_DIR="/tmp/caker-sparkle"

# Advanced options
ENABLE_SYSTEM_PROFILE="false"
ENABLE_AUTOMATIC_DOWNLOAD="true"
ENABLE_AUTOMATIC_INSTALLATION="false"
MAXIMUM_UPDATE_SIZE="500000000"  # 500 MB

# Custom URLs (optional)
# CUSTOM_APPCAST_URL="https://your-site.com/appcast.xml"
# CUSTOM_DOWNLOAD_URL="https://your-site.com/releases"

# Configuration GitHub Actions
XCODE_VERSION="15.4"
MACOS_VERSION="14"
RUNNER_OS="macos-14"