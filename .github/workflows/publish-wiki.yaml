name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - wiki/**
      - Scripts/publish-wiki.sh
      - Scripts/update-wiki-release-notes-from-git.sh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'pull_request_target' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update release notes from git log
        run: |
          chmod +x ./Scripts/update-wiki-release-notes-from-git.sh
          ./Scripts/update-wiki-release-notes-from-git.sh "${GITHUB_REF_NAME}"

      - name: Publish wiki
        env:
          GH_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git config user.name || true)" ]; then
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
          fi
          chmod +x ./Scripts/publish-wiki.sh
          ./Scripts/publish-wiki.sh "${GITHUB_REPOSITORY}"
