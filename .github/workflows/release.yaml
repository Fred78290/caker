name: Release
on:
  push:
    tags:
      - "release"
      - "prerelease"

env:
  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  TEAM_ID: ${{ vars.TEAM_ID }}
  DEVELOPER_ID: ${{ vars.DEVELOPER_ID }}
  APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  RUN_PYTEST: ${{ vars.RUN_PYTEST }}
  RUN_SWIFT_TESTS: ${{ vars.RUN_SWIFT_TESTS }}
  CAKE_HOME: "${{ github.workspace }}/.cake"
  PKGDIR: "${{ github.workspace }}/.ci/pkg/Caker.app"
  NOTARYZATION: ${{ vars.NOTARYZATION }}
  SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
  SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
  SETUP_KEYCHAIN: ${{ vars.SETUP_KEYCHAIN }}
  CODESIGN_REQUIREMENT: ${{ vars.CODESIGN_REQUIREMENT }}
  BASE_VERSION: ${{ vars.BASE_VERSION }}
permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'pull_request_target' }}
    runs-on: self-hosted
    timeout-minutes: 60
    outputs:
      build_release: ${{ steps.version.outputs.build_release }}
      build_package: ${{ steps.version.outputs.build_package }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check tools
        id: check
        run: |
          echo "run_pytest=${RUN_PYTEST}" >> ${GITHUB_OUTPUT}
          if [ "${RUNNER_ENVIRONMENT}" == "github-hosted" ]; then
            echo "Running on github-hosted runner, checking for required tools..."
            echo PATH=${PATH}
            if [ -z "$(command -v python)" ]; then
              echo "install_python=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_python=false" >> ${GITHUB_OUTPUT}
            fi

            if [ -z "$(command -v go)" ]; then
              echo "install_golang=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_golang=false" >> ${GITHUB_OUTPUT}
            fi

            if [ -z "$(command -v brew)" ]; then
              echo "install_brew=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_brew=false" >> ${GITHUB_OUTPUT}
            fi

            if [ -z "$(command -v swift)" ]; then
              echo "install_swift=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_swift=false" >> ${GITHUB_OUTPUT}
            fi

            echo "setup_keychain=true" >> ${GITHUB_OUTPUT}
            echo "KEYCHAIN_PATH=${RUNNER_TEMP}/app-signing.keychain-db" | tee -a ${GITHUB_ENV}
          else
            echo "Not running on github-hosted runner, skipping tool checks."

            if [ "${SETUP_KEYCHAIN}" == "true" ] || [ -z "$(security find-certificate -a | grep ${TEAM_ID})" ]; then
              echo "setup_keychain=true" >> ${GITHUB_OUTPUT}
              echo "KEYCHAIN_PATH=${RUNNER_TEMP}/app-signing.keychain-db" | tee -a ${GITHUB_ENV}
            else
              echo "setup_keychain=false" >> ${GITHUB_OUTPUT}
              echo "KEYCHAIN_PATH=" | tee -a ${GITHUB_ENV}
            fi

            echo "install_python=false" >> ${GITHUB_OUTPUT}
            echo "install_golang=false" >> ${GITHUB_OUTPUT}
            echo "install_brew=false" >> ${GITHUB_OUTPUT}
            echo "install_swift=false" >> ${GITHUB_OUTPUT}
          fi

      - name: 🛠️ checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🛠️ Setup Homebrew
        id: homebrew
        if: steps.check.outputs.install_brew == 'true'
        uses: Homebrew/actions/setup-homebrew@master

      - name: 🛠️ Setup Python
        id: python
        uses: actions/setup-python@v6
        if: steps.check.outputs.install_python == 'true'
        with:
          python-version: "3.13"

      - name: 🛠️ Setup Swift
        id: swift
        if: steps.check.outputs.install_swift == 'true'
        uses: swift-actions/setup-swift@v2.4.0

      - name: 📊 Version
        id: version
        run: |
          BASE_VERSION="${BASE_VERSION:-1.0}"
          VERSION="${BASE_VERSION}.$(git rev-list --count HEAD)"
          PACKAGE=false
          if [ "${{ steps.check.outputs.install_brew }}" == "true" ]; then
            brew install create-dmg gettext jq libxml2
          else
            if [ -z "$(command -v jq)" ]; then
              brew install jq
            fi
            if [ -z "$(command -v create-dmg)" ]; then
              brew install create-dmg
            fi
            if [ -z "$(command -v xmllint)" ]; then
              brew install libxml2
            fi
          fi

          if [[ "${GITHUB_REF_NAME}" == "prerelease" ]]; then
            PACKAGE=true
            BUILDRELEASE=false
          elif [[ "${GITHUB_REF_NAME}" == "release" ]]; then
            PACKAGE=true
            BUILDRELEASE=true
          fi

          if [ ${PACKAGE} == "true" ] && [ ${GITHUB_EVENT_NAME} != "push" ]; then
            PACKAGE=false
          fi

          mkdir -p "${GITHUB_WORKSPACE}/build"
          PKG_PATH="${GITHUB_WORKSPACE}/build/Caker.pkg"
          DMG_PATH="${GITHUB_WORKSPACE}/build/Caker.dmg"

          echo "PKG_PATH=${PKG_PATH}" | tee -a ${GITHUB_ENV}
          echo "DMG_PATH=${DMG_PATH}" | tee -a ${GITHUB_ENV}
          echo "VERSION=${VERSION}" | tee -a ${GITHUB_ENV}
          echo "PACKAGE=${PACKAGE}" | tee -a ${GITHUB_ENV}
          echo "BUILDRELEASE=${BUILDRELEASE}" | tee -a ${GITHUB_ENV}

          echo "build_release=${BUILDRELEASE}" | tee -a ${GITHUB_OUTPUT}
          echo "build_package=${PACKAGE}" | tee -a ${GITHUB_OUTPUT}
          echo "version=${VERSION}" | tee -a ${GITHUB_OUTPUT}
          echo "pkg_path=${PKG_PATH}" | tee -a ${GITHUB_OUTPUT}
          echo "dmg_path=${DMG_PATH}" | tee -a ${GITHUB_OUTPUT}
          echo "version_path=${GITHUB_WORKSPACE}/build/version.txt" | tee -a ${GITHUB_OUTPUT}

          echo -n "${VERSION}" > "${GITHUB_WORKSPACE}/build/version.txt"

      - name: 🛠️ Install the Apple certificate and provisioning profile
        id: setup_keychain
        if: ${{ steps.check.outputs.setup_keychain == 'true' }}
        run: |
          ./.ci/setup-keychain.sh "${KEYCHAIN_PATH}"

      - name: 👷 Build Swift package
        id: build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          security find-certificate -a|grep "${TEAM_ID}" || true
          set -o pipefail
          ./Scripts/build-signed-release.sh "${KEYCHAIN_PATH}" 2>&1 | grep -v -E 'Emit|Compiling|Fetch|Comput|Creating|Working|Write|Copy|Archiving'

      - name: 🧪 Run tests
        id: tests
        if: vars.RUN_SWIFT_TESTS == 'true'
        run: |
          # Run tests for the Swift package
          set -o pipefail
          export PATH=${GITHUB_WORKSPACE}/.ci/pkg/Caker.app/Contents/PlugIns/caked.bundle/Contents/MacOS:/.ci/pkg/Caker.app/Contents/PlugIns/cakectl.bundle/Contents/MacOS:${PATH}
          swift package config set-mirror --original https://github.com/apple/swift-argument-parser --mirror https://github.com/Fred78290/swift-argument-parser
          swift package resolve
          jq '(.pins[] | select(.identity == "swift-argument-parser")) |= (
            .location = "https://github.com/Fred78290/swift-argument-parser" |
            .state.revision = "d554955e8c280aa4c4a05a039a968f0205656e77"
          )' Package.resolved > Package.resolved.tmp && mv Package.resolved.tmp Package.resolved

          swift test -Xswiftc -D -Xswiftc SPARKLE -Xswiftc -D -Xswiftc USE_VIRTUAL_INSTALL_BACKEND 2>&1 | grep -v -E 'Emit|Compiling|Fetch|Comput|Creating|Working|Write|Copy|Archiving|CoreData'

      - name: 🧪 Run integration tests
        id: integration_tests
        if: steps.check.outputs.run_pytest == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Run tests for the Swift package
          export PATH=${GITHUB_WORKSPACE}/.ci/pkg/Caker.app/Contents/PlugIns:${PATH}
          if [ -z "$(command -v virtualenv)" ]; then
            brew install virtualenv
          fi
          cd integration/tests
          virtualenv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pytest --verbose --junit-xml=pytest-junit.xml

      - name: 📦 Package
        id: package
        if: steps.version.outputs.build_package == 'true'
        env:
          PKG_PATH: ${{ steps.version.outputs.pkg_path }}
        run: |
          export VERSION="${{ steps.version.outputs.version }}"
          ./.ci/create-pkg.sh "${KEYCHAIN_PATH}"

      - name: 💿 Create DMG
        id: create_dmg
        if: steps.version.outputs.build_package == 'true'
        env:
          DMG_PATH: ${{ steps.version.outputs.dmg_path }}
        run: |
          export VERSION="${{ steps.version.outputs.version }}"
          ./.ci/create-dmg.sh "${KEYCHAIN_PATH}"

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v7
        if: steps.version.outputs.build_package == 'true'
        with:
          name: build-outputs
          path: |
            ${{ steps.version.outputs.dmg_path }}
            ${{ steps.version.outputs.pkg_path }}
            ${{ steps.version.outputs.version_path }}
          retention-days: 1
          overwrite: true

      - name: 🏷️ Create version tag
        id: create_tag
        if: steps.version.outputs.build_package == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists, skipping."
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: 🧹 Clean up keychain and provisioning profile
        id: cleanup
        if: ${{ always() && steps.check.outputs.setup_keychain == 'true' }}
        run: |
          if [ -f "${KEYCHAIN_PATH}" ]; then
            echo "Deleting keychain at ${KEYCHAIN_PATH}"
            security delete-keychain "${KEYCHAIN_PATH}"
          else
            echo "Keychain at ${KEYCHAIN_PATH} does not exist, skipping deletion."
          fi


      - name: 🧹 Clean up repo
        id: cleanup-repo
        if: always()
        run: |
          # Reset git working directory
          git clean -fd
          git reset --hard HEAD

  publish:
    if: needs.build.outputs.build_package == 'true'
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🛠️ checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 📱 Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-outputs
          path: build/

      - name: 📡 Publish package on GitHub
        id: publish_package
        env:
          VERSION: "${{ needs.build.outputs.version }}"
        run: |
          # Get the version from the build job outputs
          # Check if the release already exists
          PUB_VERSION="v${VERSION}"
          echo "Release version: ${VERSION}"

          if gh release view "${PUB_VERSION}" > /dev/null 2>&1; then
            echo "Release ${PUB_VERSION} already exists, skipping creation."
          else
            echo "Creating release ${PUB_VERSION}..."
            if [ "${GITHUB_REF_NAME}" == "prerelease" ]; then
              gh release create --prerelease --generate-notes \
                --title "${PUB_VERSION}" "${PUB_VERSION}" \
                "./build/Caker.dmg" \
                "./build/Caker.pkg"
            else
              gh release create --generate-notes \
                --title "${PUB_VERSION}" "${PUB_VERSION}" \
                "./build/Caker.dmg" \
                "./build/Caker.pkg"
            fi
          fi

  wiki:
    if: needs.build.outputs.build_release == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERSION: "${{ needs.build.outputs.version }}"
    steps:
      - name: 🛠️ checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 📖 Publish wiki
        env:
          GH_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          chmod +x ./Scripts/publish-wiki.sh
          ./Scripts/publish-wiki.sh "v${VERSION}"

      - name: 📝 Update release notes from git log
        id: update-release-notes
        env:
          RELEASE_PATHS: Sources wiki .github/workflows
          MAX_COMMITS: "100"
        run: |
          ./Scripts/update-wiki-release-notes-from-git.sh "v${VERSION}"


  sparkle-sign:
    if: needs.build.outputs.build_release == 'true'
    needs: [build, publish]
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      VERSION: "${{ needs.build.outputs.version }}"
    steps:
      - name: 🛠️ checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 📱 Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-outputs
          path: build/

      - name: 👷 Setup Sparkle
        id: setup_sparkle
        run: |
          rm -rf .bin
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-for-Swift-Package-Manager.zip -o /tmp/sparkle.zip
          unzip -o -j /tmp/sparkle.zip bin/generate_appcast bin/sign_update bin/generate_keys -d .bin
          rm -rf /tmp/sparkle.zip

      - name: 🔐 Setup Sparkle keys
        id: sparkle_keys
        run: |
          mkdir -p .sparkle
          echo "${SPARKLE_PRIVATE_KEY}" > .sparkle/sparkle_private_key.pem
          echo "${SPARKLE_PUBLIC_KEY}" > .sparkle/sparkle_public_key.pem

      - name: 📡 Generate Custom Appcast
        id: appcast
        run: |
          # Generate custom XML appcast
          ./Scripts/sparkle-sign-release.sh "${VERSION}" ./build/Caker.dmg

      - name: 🌐 Deploy Appcast to GitHub Pages
        id: deploy-appcast
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Deploy appcast automatically
          ./Scripts/sparkle-deploy-appcast.sh --force
