name: Release
on:
  push:
    tags:
      - "v*"
      - "snapshot"

env:
  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  TEAM_ID: ${{ secrets.TEAM_ID }}
  DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
  APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  RUN_PYTEST: ${{ vars.RUN_PYTEST }}
  RUN_SWIFT_TESTS: ${{ vars.RUN_SWIFT_TESTS }}
  CAKE_HOME: "${{ github.workspace }}/.cake"
  PKGDIR: "${{ github.workspace }}/.ci/pkg/Caker.app"
  NOTARYZATION: ${{ vars.NOTARYZATION }}
  SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
  SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
  SETUP_KEYCHAIN: ${{ vars.SETUP_KEYCHAIN }}

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'pull_request_target' }}
    runs-on: self-hosted
    timeout-minutes: 60
    outputs:
      build_release: ${{ steps.version.outputs.build_release }}
      build_package: ${{ steps.version.outputs.build_package }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check tools
        id: check
        run: |
          echo "run_pytest=${RUN_PYTEST}" >> ${GITHUB_OUTPUT}
          if [ "${RUNNER_ENVIRONMENT}" == "github-hosted" ]; then
            echo "Running on github-hosted runner, checking for required tools..."
            echo PATH=${PATH}
            if [ -z "$(command -v python)" ]; then
              echo "install_python=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_python=false" >> ${GITHUB_OUTPUT}
            fi

            if [ -z "$(command -v go)" ]; then
              echo "install_golang=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_golang=false" >> ${GITHUB_OUTPUT}
            fi

            if [ -z "$(command -v brew)" ]; then
              echo "install_brew=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_brew=false" >> ${GITHUB_OUTPUT}
            fi

            if [ -z "$(command -v swift)" ]; then
              echo "install_swift=true" >> ${GITHUB_OUTPUT}
            else
              echo "install_swift=false" >> ${GITHUB_OUTPUT}
            fi
          else
            echo "Not running on github-hosted runner, skipping tool checks."
            echo "install_python=false" >> ${GITHUB_OUTPUT}
            echo "install_golang=false" >> ${GITHUB_OUTPUT}
            echo "install_brew=false" >> ${GITHUB_OUTPUT}
            echo "install_swift=false" >> ${GITHUB_OUTPUT}
          fi

      - name: 🛠️ checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🛠️ Setup Homebrew
        id: homebrew
        if: steps.check.outputs.install_brew == 'true'
        uses: Homebrew/actions/setup-homebrew@master

      - name: 🛠️ Setup Python
        id: python
        uses: actions/setup-python@v6
        if: steps.check.outputs.install_python == 'true'
        with:
          python-version: "3.13"

      - name: 🛠️ Setup Go
        id: go
        if: steps.check.outputs.install_golang == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.23.0"
          cache: true
          cache-dependency-path: qcow2convert/go.mod

      - name: 🛠️ Setup Swift
        id: swift
        if: steps.check.outputs.install_swift == 'true'
        uses: swift-actions/setup-swift@v2.4.0

      - name: 📊 Version
        id: version
        run: |
          VERSION="${GITHUB_REF##*/}"
          PACKAGE=false

          if [ "${{ steps.check.outputs.install_brew }}" == "true" ]; then
            brew install create-dmg gettext jq libxml2
          else
            if [ -z "$(command -v envsubst)"  ]; then
              brew install gettext
            fi
            if [ -z "$(command -v jq)" ]; then
              brew install jq
            fi
            if [ -z "$(command -v create-dmg)" ]; then
              brew install create-dmg
            fi
            if [ -z "$(command -v xmllint)" ]; then
              brew install libxml2
            fi
          fi

          if [ "${SETUP_KEYCHAIN}" == "true" ]; then
            KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          else
            KEYCHAIN_PATH=""
          fi

          if [[ "${VERSION}" == "snapshot" ]]; then
            VERSION="SNAPSHOT-$(date +%Y.%m.%d)-$(git rev-parse --short=8 HEAD)"
            PACKAGE=true
            RELEASE=false
          elif [[ "${VERSION}" == v* ]]; then
            VERSION="${VERSION:1}"
            PACKAGE=true
            RELEASE=true
          fi

          if [ ${PACKAGE} == "true" ] && [ ${GITHUB_EVENT_NAME} != "push" ]; then
            PACKAGE=false
          fi

          mkdir -p "${GITHUB_WORKSPACE}/build"
          PKG_PATH="${GITHUB_WORKSPACE}/build/Caker.pkg"
          DMG_PATH="${GITHUB_WORKSPACE}/build/Caker.dmg"

          echo "PKG_PATH=${PKG_PATH}" >> ${GITHUB_ENV}
          echo "DMG_PATH=${DMG_PATH}" >> ${GITHUB_ENV}
          echo "VERSION=${VERSION}" >> ${GITHUB_ENV}
          echo "PACKAGE=${PACKAGE}" >> ${GITHUB_ENV}
          echo "RELEASE=${RELEASE}" >> ${GITHUB_ENV}
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> ${GITHUB_ENV}

          echo "build_release=${RELEASE}" >> ${GITHUB_OUTPUT}
          echo "build_package=${PACKAGE}" >> ${GITHUB_OUTPUT}
          echo "version=${VERSION}" >> ${GITHUB_OUTPUT}
          echo "pkg_path=${PKG_PATH}" >> ${GITHUB_OUTPUT}
          echo "dmg_path=${DMG_PATH}" >> ${GITHUB_OUTPUT}
          echo "version_path=${GITHUB_WORKSPACE}/build/version.txt" >> ${GITHUB_OUTPUT}
          echo "keychain_path=${KEYCHAIN_PATH}" >> ${GITHUB_OUTPUT}

          echo -n "${VERSION}" > "${GITHUB_WORKSPACE}/build/version.txt"

          export VERSION="${VERSION}"

          TMPFILE=$(mktemp)
          envsubst < Sources/cakedlib/CI/CI.swift > ${TMPFILE}
          cp ${TMPFILE} Sources/cakedlib/CI/CI.swift

      - name: 👷 Build QCow2convert framework
        id: build_qcow2convert
        run: |
          cd qcow2convert
          ./build.sh

      - name: 🛠️ Install the Apple certificate and provisioning profile
        id: setup_keychain
        if: vars.SETUP_KEYCHAIN == 'true'
        run: |
          ./.ci/setup-keychain.sh "${KEYCHAIN_PATH}"

      - name: 🧪 Run tests
        id: tests
        if: vars.RUN_SWIFT_TESTS == 'true'
        run: |
          # Run tests for the Swift package
          export PATH=${GITHUB_WORKSPACE}/.ci/pkg/Caker.app/Contents/PlugIns:${PATH}
          swift test|grep -v Compiling|grep -v CoreData

      - name: 👷 Build Swift package
        id: build
        env:
          KEYCHAIN_PATH: ${{ steps.version.outputs.keychain_path }}
        run: |
          ./Scripts/build-signed-release.sh "${KEYCHAIN_PATH}"
          git fetch origin main
          git reset --hard origin/main

      - name: 🧪 Run integration tests
        id: integration_tests
        if: steps.check.outputs.run_pytest == 'true'
        env:
          KEYCHAIN_PATH: ${{ steps.version.outputs.keychain_path }}
        run: |
          # Run tests for the Swift package
          export PATH=${GITHUB_WORKSPACE}/.ci/pkg/Caker.app/Contents/PlugIns:${PATH}
          if [ -z "$(command -v virtualenv)" ]; then
            brew install virtualenv
          fi
          cd integration/tests
          virtualenv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pytest --verbose --junit-xml=pytest-junit.xml

      - name: 📦 Package
        id: package
        if: steps.version.outputs.build_package == 'true'
        env:
          KEYCHAIN_PATH: ${{ steps.version.outputs.keychain_path }}
          PKG_PATH: ${{ steps.version.outputs.pkg_path }}
        run: |
          export VERSION="${{ steps.version.outputs.version }}"
          ./.ci/create-pkg.sh "${KEYCHAIN_PATH}"

      - name: 💿 Create DMG
        id: create_dmg
        if: steps.version.outputs.build_package == 'true'
        env:
          KEYCHAIN_PATH: ${{ steps.version.outputs.keychain_path }}
          DMG_PATH: ${{ steps.version.outputs.dmg_path }}
        run: |
          export VERSION="${{ steps.version.outputs.version }}"
          ./.ci/create-dmg.sh "${KEYCHAIN_PATH}"

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v7
        if: steps.version.outputs.build_package == 'true'
        with:
          name: build-outputs
          path: |
            ${{ steps.version.outputs.dmg_path }}
            ${{ steps.version.outputs.pkg_path }}
            ${{ steps.version.outputs.version_path }}
          retention-days: 1
          overwrite: true

      - name: 🧹 Clean up keychain and provisioning profile
        id: cleanup
        env:
          KEYCHAIN_PATH: ${{ steps.version.outputs.keychain_path }}
        if: always() && vars.SETUP_KEYCHAIN == 'true'
        run: |
          security delete-keychain "${KEYCHAIN_PATH}"

  publish:
    if: needs.build.outputs.build_package == 'true'
    needs: [build, sparkle-sign]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📱 Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-outputs
          path: build/

      - name: 📡 Publish package on GitHub
        id: publish_package
        env:
          VERSION: "${{ needs.build.outputs.version }}"
        run: |
          # Get the version from the build job outputs
          # Check if the release already exists
          if [ ${VERSION##*/} == "snapshot" ]; then
              PUB_VERSION="${VERSION}"
              echo "Snapshot version: ${VERSION}"
          else
              PUB_VERSION="v${VERSION}"
              echo "Release version: ${VERSION}"
          fi

          if gh release view "${PUB_VERSION}" > /dev/null 2>&1; then
            echo "Release ${PUB_VERSION} already exists, skipping creation."
          else
            echo "Creating release ${PUB_VERSION}..."
            if [ ${GITHUB_REF##*/} == "snapshot" ]; then
              gh release create --repo "${GITHUB_REPOSITORY}" --prerelease --generate-notes \
                --title "${PUB_VERSION}" "${PUB_VERSION}" \
                "./build/Caker.dmg" \
                "./build/Caker.pkg"
            else
              gh release create --repo "${GITHUB_REPOSITORY}" --generate-notes \
                --title "${PUB_VERSION}" "${PUB_VERSION}" \
                "./build/Caker.dmg" \
                "./build/Caker.pkg"
            fi
          fi

  wiki:
    if: needs.build.outputs.build_release == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🛠️ checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: 📖 Publish wiki
        env:
          GH_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          chmod +x ./Scripts/publish-wiki.sh
          ./Scripts/publish-wiki.sh "${GITHUB_REPOSITORY}"

      - name: 📝 Update release notes from git log
        id: update-release-notes
        env:
          RELEASE_PATHS: Sources wiki .github/workflows
          MAX_COMMITS: "100"
        run: |
          ./Scripts/update-wiki-release-notes-from-git.sh "${GITHUB_REF_NAME}"


  sparkle-sign:
    if: needs.build.outputs.build_release == 'true'
    needs: build
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      VERSION: "${{ needs.build.outputs.version }}"
    steps:
      - name: 🛠️ checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 📱 Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-outputs
          path: build/

      - name: 👷 Setup Sparkle
        id: setup_sparkle
        run: |
          rm -rf .bin
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-for-Swift-Package-Manager.zip -o /tmp/sparkle.zip
          unzip -o -j /tmp/sparkle.zip bin/generate_appcast bin/sign_update bin/generate_keys -d .bin
          rm -rf /tmp/sparkle.zip

      - name: 🔐 Setup Sparkle keys
        id: sparkle_keys
        run: |
          mkdir -p .sparkle
          echo "${SPARKLE_PRIVATE_KEY}" > .sparkle/sparkle_private_key.pem
          echo "${SPARKLE_PUBLIC_KEY}" > .sparkle/sparkle_public_key.pem

      - name: 📡 Generate Custom Appcast
        id: appcast
        run: |
          # Generate custom XML appcast
          sh -x -- ./Scripts/sparkle-sign-release.sh "${VERSION}" ./build/Caker.dmg

      - name: 🌐 Deploy Appcast to GitHub Pages
        id: deploy-appcast
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Deploy appcast automatically
          sh -x -- ./Scripts/sparkle-deploy-appcast.sh --force
