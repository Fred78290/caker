name: Artifact Handler

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_id:
        description: "Release workflow run ID (optional - uses latest if empty)"
        required: false
        type: string
      artifact_name:
        description: "Name of the artifact to download"
        required: false
        default: "build-outputs"
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  actions: read

jobs:
  check-release-type:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_process: ${{ steps.check-outputs.outputs.should_process }}
      run_id: ${{ steps.determine-run.outputs.run_id }}
      
    steps:
      - name: 🔍 Determine workflow run ID
        id: determine-run
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.run_id }}" ]; then
              echo "run_id=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
            else
              # Get the latest successful Release workflow run
              RUN_ID=$(gh api repos/${{ github.repository }}/actions/workflows/release.yaml/runs \
                --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -1)
              echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
            fi
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          fi

      - name: 📋 Check Release workflow outputs
        id: check-outputs  
        run: |
          RUN_ID="${{ steps.determine-run.outputs.run_id }}"
          
          # Get jobs from the Release workflow run
          JOBS_DATA=$(gh api repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs)
          
          # Check if build job has build_release=true in its outputs/conclusion
          BUILD_SUCCESS=$(echo "${JOBS_DATA}" | jq -r '.jobs[] | select(.name == "build") | .conclusion')
          
          if [ "${BUILD_SUCCESS}" == "success" ]; then
            # For workflow_run events, we can check if wiki job exists and ran
            WIKI_SUCCESS=$(echo "${JOBS_DATA}" | jq -r '.jobs[] | select(.name == "wiki") | .conclusion')
            
            if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${WIKI_SUCCESS}" == "success" ]; then
              echo "should_process=true" >> $GITHUB_OUTPUT
              echo "✅ Release workflow indicates build_release=true"
            else
              echo "should_process=false" >> $GITHUB_OUTPUT
              echo "❌ No wiki job found - this was not a release build"
            fi
          else
            echo "should_process=false" >> $GITHUB_OUTPUT
            echo "❌ Build job was not successful"
          fi

  process-artifacts:
    if: ${{ needs.check-release-type.outputs.should_process == 'true' }}
    needs: check-release-type
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0


      - name: 🔍 Get workflow run ID
        id: get-run-id
        run: |
          echo "run_id=${{ needs.check-release-type.outputs.run_id }}" >> $GITHUB_OUTPUT
          echo "artifact_name=${{ github.event.inputs.artifact_name || 'build-outputs' }}" >> $GITHUB_OUTPUT

      - name: 📥 Download artifacts from Release workflow
        uses: actions/download-artifact@v7
        with:
          name: ${{ steps.get-run-id.outputs.artifact_name }}
          path: ./build
          run-id: ${{ steps.get-run-id.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Get Release workflow details
        id: version
        run: |
          VERSION=$(cat ./build/version.txt 2>/dev/null || echo "SNAPSHOT")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Detected version: ${VERSION}"

      - name: 👷 Setup Sparkle
        id: setup_sparkle
        run: |
          rm -rf .bin
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-for-Swift-Package-Manager.zip -o /tmp/sparkle.zip
          unzip -o -j /tmp/sparkle.zip bin/generate_appcast bin/sign_update bin/generate_keys -d .bin
          rm -rf /tmp/sparkle.zip


      - name: 🔐 Setup Sparkle keys
        id: sparkle_keys
        run: |
          mkdir -p .sparkle
          echo "${SPARKLE_PRIVATE_KEY}" > .sparkle/sparkle_private_key.pem
          echo "${SPARKLE_PUBLIC_KEY}" > .sparkle/sparkle_public_key.pem


      - name: 📡 Generate Custom Appcast
        id: appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Generate custom XML appcast
          set -x -- ./Scripts/sparkle-sign-release.sh "${VERSION}" ./build/Caker.dmg


      - name: 🌐 Deploy Appcast to GitHub Pages
        id: deploy-appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Deploy appcast automatically
          sh -x -- ./Scripts/sparkle-deploy-appcast.sh --force
